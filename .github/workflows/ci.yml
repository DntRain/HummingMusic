name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y fluidsynth libfluidsynth-dev

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: 代码风格检查 (flake8)
        run: |
          flake8 src/ tests/ --ignore=E501 --statistics --count

      - name: 运行测试 + 覆盖率
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=xml

      - name: 上传覆盖率报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

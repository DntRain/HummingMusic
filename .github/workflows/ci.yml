name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y fluidsynth libfluidsynth-dev ffmpeg
          pip install --upgrade pip setuptools wheel

      - name: 安装 Python 依赖 (CI)
        run: |
          pip install -r requirements-ci.txt

      - name: 代码风格检查 (flake8)
        run: |
          flake8 src/ tests/ --ignore=E501,W503 --statistics --count

      - name: 运行测试 + 覆盖率
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing
